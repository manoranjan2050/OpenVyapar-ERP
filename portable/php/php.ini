; OpenVyapar ERP - Portable PHP Configuration

[PHP]
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
serialize_precision = -1
zend.enable_gc = On
expose_php = Off

; Errors - suppress in production
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = logs/php-error.log

; Limits
max_execution_time = 120
max_input_time = 120
memory_limit = 256M
post_max_size = 64M
upload_max_filesize = 64M
max_file_uploads = 20

; Date
[Date]
date.timezone = Asia/Kolkata

; Sessions
[Session]
session.save_handler = files
session.save_path = "storage/framework/sessions"
session.use_strict_mode = 1
session.use_cookies = 1
session.name = OPENVYAPAR_SESSION
session.gc_maxlifetime = 7200
session.gc_probability = 1
session.gc_divisor = 100

; Extensions — only what Laravel + SQLite needs
extension_dir = "ext"

extension=curl
extension=fileinfo
extension=mbstring
extension=openssl
extension=pdo_sqlite
extension=sqlite3
extension=zip
extension=gd
extension=intl

; Mail (disabled in portable)
[mail function]
SMTP = localhost
smtp_port = 25
sendmail_from = noreply@openvyapar.local

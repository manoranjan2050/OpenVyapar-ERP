version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: openvyapar_backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: openvyapar
      DB_USERNAME: openvyapar
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - storage_data:/var/www/html/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: openvyapar_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  db:
    image: mariadb:11
    container_name: openvyapar_db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: openvyapar
      MARIADB_USER: openvyapar
      MARIADB_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: openvyapar_pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: openvyapar
      PMA_PASSWORD: secret
    depends_on:
      - db

volumes:
  db_data:
  storage_data:
